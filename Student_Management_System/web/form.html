<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT_FORM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><b><u>STUDENT FORM</u></b></h1>
    <form>
    <fieldset id="f1">
        <legend><b>PERSONAL INFORMATION</b></legend>
        <label for="name">NAME :</label>
       <input id="name" type="text"><br>
       <br>
      <label for="fname"> FATHER'S NAME :</label>
       <input id="fname" type="text"><br>
       <br>
      <label for="mname">MOTHER'S NAME :</label>
       <input id="mname" type="text"><br>
       <br>
      <label for="num">PHONE :</label>
       <input id="num" type="number"><br>
       <br>
      <label for="mail">EMAIL :</label>
       <input id="mail" type="email"><br>
       <br>
       <label><input type="checkbox" name="gender" value="MALE">MALE</label>
       <label><input type="checkbox" name="gender" value="FEMALE">FEMALE</label>  
    </fieldset><BR>
        <br>
        <br>
        <fieldset>
        <legend><b>EDUCATIONAL INFORMATION</b></legend>
        <label for="cor">COURSE :</label>
       <input id="cor" type="text"><br>
       <br>
      <label for="br"> BRANCH :</label>
       <input id="br" type="text"><br>
       <br>
      <label for="y">YEAR :</label>
       <input id="y" type="number"><br>
       <br>
      <label for="num">PHONE :</label>
       <input id="num" type="number"><br>
       <br>  
    </fieldset>
    <br>
    <br>
    <button id="b" type="submit">submit</button>
    </form>
    
</body>
</html>
